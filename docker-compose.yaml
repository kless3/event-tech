services:
  kafka:
    image: redpandadata/redpanda:v24.3.5
    container_name: ems-kafka
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://kafka:9092,OUTSIDE://localhost:19092
    ports:
    
      - "19092:19092"
    volumes:
      - kafka-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:17-alpine
    container_name: ems-user-service-postgres
    environment:
      POSTGRES_DB: user_service
      POSTGRES_USER: user_service
      POSTGRES_PASSWORD: user_service
    ports:
      - "5432:5432"
    volumes:
      - user-service-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_service -d user_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: ems-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3.8
    container_name: ems-localstack
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import json, urllib.request; data=json.load(urllib.request.urlopen('http://localhost:4566/_localstack/health')); exit(0 if 's3' in data.get('services', {}) else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    container_name: ems-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8088:8080"
    volumes:
      - ./keycloak/ems-realm.json:/opt/keycloak/data/import/ems-realm.json:ro
      - keycloak-data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /realms/ems/.well-known/openid-configuration HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q 'issuer' <&3"]
      interval: 10s
      timeout: 5s
      retries: 20

  user-service:
    build:
      context: ./user-service
    container_name: ems-user-service
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/user_service
      SPRING_DATASOURCE_USERNAME: user_service
      SPRING_DATASOURCE_PASSWORD: user_service
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_SECURITY_KEK_BASE64: ${APP_SECURITY_KEK_BASE64:?APP_SECURITY_KEK_BASE64 must be set to a 256-bit Base64 AES key}
    ports:
      - "8080:8080"

  ticket-postgres:
    image: postgres:17-alpine
    container_name: ems-ticket-service-postgres
    environment:
      POSTGRES_DB: ticket_service
      POSTGRES_USER: ticket_service
      POSTGRES_PASSWORD: ticket_service
    ports:
      - "5433:5432"
    volumes:
      - ticket-service-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticket_service -d ticket_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  ticket-service:
    build:
      context: ./ticket-service
    container_name: ems-ticket-service
    depends_on:
      kafka:
        condition: service_healthy
      ticket-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_started
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://ticket-postgres:5432/ticket_service
      SPRING_DATASOURCE_USERNAME: ticket_service
      SPRING_DATASOURCE_PASSWORD: ticket_service
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_CLIENTS_USER_SERVICE_BASE_URL: http://user-service:8080
      APP_CLIENTS_EVENT_SERVICE_BASE_URL: http://event-service:8082
    ports:
      - "8081:8081"

  event-postgres:
    image: postgres:17-alpine
    container_name: ems-event-service-postgres
    environment:
      POSTGRES_DB: event_service
      POSTGRES_USER: event_service
      POSTGRES_PASSWORD: event_service
    ports:
      - "5434:5432"
    volumes:
      - event-service-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U event_service -d event_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  event-service:
    build:
      context: ./event-service
    container_name: ems-event-service
    depends_on:
      kafka:
        condition: service_healthy
      event-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_started
      ticket-service:
        condition: service_started
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://event-postgres:5432/event_service
      SPRING_DATASOURCE_USERNAME: event_service
      SPRING_DATASOURCE_PASSWORD: event_service
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_CLIENTS_USER_SERVICE_BASE_URL: http://user-service:8080
      APP_CLIENTS_TICKET_SERVICE_BASE_URL: http://ticket-service:8081
    ports:
      - "8082:8082"

  payment-postgres:
    image: postgres:17-alpine
    container_name: ems-payment-service-postgres
    environment:
      POSTGRES_DB: payment_service
      POSTGRES_USER: payment_service
      POSTGRES_PASSWORD: payment_service
    ports:
      - "5435:5432"
    volumes:
      - payment-service-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_service -d payment_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-service:
    build:
      context: ./payment-service
    container_name: ems-payment-service
    depends_on:
      kafka:
        condition: service_healthy
      payment-postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    environment:
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://payment-postgres:5432/payment_service
      SPRING_DATASOURCE_USERNAME: payment_service
      SPRING_DATASOURCE_PASSWORD: payment_service
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_S3_ENDPOINT: http://localstack:4566
      APP_S3_REGION: us-east-1
      APP_S3_ACCESS_KEY: test
      APP_S3_SECRET_KEY: test
      APP_RECEIPTS_BUCKET: ems-payment-receipts
      APP_RECEIPTS_PUBLIC_BASE_URL: http://localhost:4566/ems-payment-receipts
    ports:
      - "8084:8084"

  notification-postgres:
    image: postgres:17-alpine
    container_name: ems-notification-service-postgres
    environment:
      POSTGRES_DB: notification_service
      POSTGRES_USER: notification_service
      POSTGRES_PASSWORD: notification_service
    ports:
      - "5436:5432"
    volumes:
      - notification-service-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification_service -d notification_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-service:
    build:
      context: ./notification-service
    container_name: ems-notification-service
    depends_on:
      kafka:
        condition: service_healthy
      notification-postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8085
      SPRING_DATASOURCE_URL: jdbc:postgresql://notification-postgres:5432/notification_service
      SPRING_DATASOURCE_USERNAME: notification_service
      SPRING_DATASOURCE_PASSWORD: notification_service
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_DELIVERY_MAX_ATTEMPTS: 3
    ports:
      - "8085:8085"

  importer-postgres:
    image: postgres:17-alpine
    container_name: ems-importer-service-postgres
    environment:
      POSTGRES_DB: importer_service
      POSTGRES_USER: importer_service
      POSTGRES_PASSWORD: importer_service
    ports:
      - "5437:5432"
    volumes:
      - importer-service-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U importer_service -d importer_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  importer-service:
    build:
      context: ./importer-service
    container_name: ems-importer-service
    depends_on:
      importer-postgres:
        condition: service_healthy
      event-service:
        condition: service_started
    environment:
      SERVER_PORT: 8086
      SPRING_DATASOURCE_URL: jdbc:postgresql://importer-postgres:5432/importer_service
      SPRING_DATASOURCE_USERNAME: importer_service
      SPRING_DATASOURCE_PASSWORD: importer_service
      APP_CLIENTS_EVENT_SERVICE_BASE_URL: http://event-service:8082
      APP_IMPORT_SCHEDULE_ENABLED: "false"
    ports:
      - "8086:8086"

  api-gateway:
    build:
      context: ./api-gateway
    container_name: ems-api-gateway
    depends_on:
      user-service:
        condition: service_started
      ticket-service:
        condition: service_started
      event-service:
        condition: service_started
      payment-service:
        condition: service_started
      notification-service:
        condition: service_started
      importer-service:
        condition: service_started
      keycloak:
        condition: service_healthy
    environment:
      SERVER_PORT: 8083
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/ems
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/ems/protocol/openid-connect/certs
      APP_ROUTES_USER_SERVICE_BASE_URL: http://user-service:8080
      APP_ROUTES_TICKET_SERVICE_BASE_URL: http://ticket-service:8081
      APP_ROUTES_EVENT_SERVICE_BASE_URL: http://event-service:8082
      APP_ROUTES_PAYMENT_SERVICE_BASE_URL: http://payment-service:8084
      APP_ROUTES_NOTIFICATION_SERVICE_BASE_URL: http://notification-service:8085
      APP_ROUTES_IMPORTER_SERVICE_BASE_URL: http://importer-service:8086
    ports:
      - "8083:8083"

volumes:
  kafka-data:
  user-service-postgres-data:
  ticket-service-postgres-data:
  event-service-postgres-data:
  payment-service-postgres-data:
  notification-service-postgres-data:
  importer-service-postgres-data:
  redis-data:
  localstack-data:
  keycloak-data:
