databaseChangeLog:
  - changeSet:
      id: 001-create-payment-service-tables
      author: ems
      changes:
        - createTable:
            tableName: payments
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: ticket_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: event_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: numeric(19, 2)
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: varchar(3)
                  constraints:
                    nullable: false
              - column:
                  name: idempotency_key
                  type: varchar(128)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(32)
                  constraints:
                    nullable: false
              - column:
                  name: failure_reason
                  type: varchar(1024)
              - column:
                  name: receipt_object_key
                  type: varchar(512)
              - column:
                  name: receipt_url
                  type: varchar(1024)
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: paid_at
                  type: timestamp
        - addUniqueConstraint:
            tableName: payments
            columnNames: idempotency_key
            constraintName: uk_payments_idempotency_key
        - createIndex:
            tableName: payments
            indexName: idx_payments_ticket_id
            columns:
              - column:
                  name: ticket_id
        - createIndex:
            tableName: payments
            indexName: idx_payments_user_id
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: payments
            indexName: idx_payments_status_created_at
            columns:
              - column:
                  name: status
              - column:
                  name: created_at
        - createTable:
            tableName: outbox_events
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: aggregate_type
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: aggregate_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: varchar(128)
                  constraints:
                    nullable: false
              - column:
                  name: topic
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: message_key
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(32)
                  constraints:
                    nullable: false
              - column:
                  name: attempts
                  type: int
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: last_error
                  type: varchar(1024)
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: published_at
                  type: timestamp
        - createIndex:
            tableName: outbox_events
            indexName: idx_payment_outbox_status_created_at
            columns:
              - column:
                  name: status
              - column:
                  name: created_at
