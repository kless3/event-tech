databaseChangeLog:
  - changeSet:
      id: 001-create-ticket-service-tables
      author: ems
      changes:
        - createTable:
            tableName: tickets
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
              - column:
                  name: event_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: encrypted_payload
                  type: varchar
              - column:
                  name: payload_iv
                  type: varchar
              - column:
                  name: status
                  type: varchar(32)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: gdpr_erased_at
                  type: timestamp
        - createIndex:
            tableName: tickets
            indexName: idx_tickets_user_id
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: tickets
            indexName: idx_tickets_event_id
            columns:
              - column:
                  name: event_id
        - createTable:
            tableName: outbox_events
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: aggregate_type
                  type: varchar(64)
                  constraints:
                    nullable: false
              - column:
                  name: aggregate_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: event_type
                  type: varchar(128)
                  constraints:
                    nullable: false
              - column:
                  name: topic
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: message_key
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: payload
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(32)
                  constraints:
                    nullable: false
              - column:
                  name: attempts
                  type: int
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: last_error
                  type: varchar(1024)
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: published_at
                  type: timestamp
        - createIndex:
            tableName: outbox_events
            indexName: idx_outbox_events_status_created_at
            columns:
              - column:
                  name: status
              - column:
                  name: created_at
        - createTable:
            tableName: processed_kafka_messages
            columns:
              - column:
                  name: message_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: topic
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: message_key
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: processed_at
                  type: timestamp
                  constraints:
                    nullable: false
