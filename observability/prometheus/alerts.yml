groups:
  - name: ems-service-health
    rules:
      - alert: EmsServiceDown
        expr: up{job=~"api-gateway|.*-service"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Booking Platform service is down"
          description: "{{ $labels.job }} has not been scraped successfully for more than 1 minute."

      - alert: EmsHighHttpServerErrorRate
        expr: |
          sum by (job) (rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
            /
          sum by (job) (rate(http_server_requests_seconds_count[5m]))
            > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP 5xx rate"
          description: "{{ $labels.job }} has more than 5% HTTP 5xx responses over 5 minutes."

      - alert: EmsHighHeapUsage
        expr: |
          sum by (job) (jvm_memory_used_bytes{area="heap"})
            /
          sum by (job) (jvm_memory_max_bytes{area="heap"})
            > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High JVM heap usage"
          description: "{{ $labels.job }} heap usage is above 90% for more than 5 minutes."

      - alert: EmsHighDatabasePoolUsage
        expr: |
          hikaricp_connections_active
            /
          hikaricp_connections_max
            > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High database connection pool usage"
          description: "{{ $labels.job }} Hikari pool usage is above 90% for more than 5 minutes."
