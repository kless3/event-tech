apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: ems
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: ghcr.io/kless3/user-service:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: ems-config
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: INTERNAL_HTTP_SCHEME
              valueFrom:
                configMapKeyRef:
                  name: ems-config
                  key: INTERNAL_HTTP_SCHEME
            - name: MANAGEMENT_OTLP_TRACING_ENDPOINT
              value: $(INTERNAL_HTTP_SCHEME)://otel-collector:4318/v1/traces
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/user_service
            - name: SPRING_DATASOURCE_USERNAME
              value: user_service
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ems-secrets
                  key: USER_SERVICE_DB_PASSWORD
            - name: APP_SECURITY_KEK_BASE64
              valueFrom:
                secretKeyRef:
                  name: ems-secrets
                  key: APP_SECURITY_KEK_BASE64
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: ems
spec:
  selector:
    app: user-service
  ports:
    - port: 8080
      targetPort: 8080
---
