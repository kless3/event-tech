apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: ems
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/kless3/api-gateway:latest
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: ems-config
          env:
            - name: SERVER_PORT
              value: "8083"
            - name: INTERNAL_HTTP_SCHEME
              valueFrom:
                configMapKeyRef:
                  name: ems-config
                  key: INTERNAL_HTTP_SCHEME
            - name: MANAGEMENT_OTLP_TRACING_ENDPOINT
              value: $(INTERNAL_HTTP_SCHEME)://otel-collector:4318/v1/traces
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              value: $(INTERNAL_HTTP_SCHEME)://keycloak:8080/realms/ems
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              value: $(INTERNAL_HTTP_SCHEME)://keycloak:8080/realms/ems/protocol/openid-connect/certs
            - name: APP_ROUTES_USER_SERVICE_BASE_URL
              value: $(INTERNAL_HTTP_SCHEME)://user-service:8080
            - name: APP_ROUTES_TICKET_SERVICE_BASE_URL
              value: $(INTERNAL_HTTP_SCHEME)://ticket-service:8081
            - name: APP_ROUTES_EVENT_SERVICE_BASE_URL
              value: $(INTERNAL_HTTP_SCHEME)://event-service:8082
            - name: APP_ROUTES_PAYMENT_SERVICE_BASE_URL
              value: $(INTERNAL_HTTP_SCHEME)://payment-service:8084
            - name: APP_ROUTES_NOTIFICATION_SERVICE_BASE_URL
              value: $(INTERNAL_HTTP_SCHEME)://notification-service:8085
            - name: APP_ROUTES_IMPORTER_SERVICE_BASE_URL
              value: $(INTERNAL_HTTP_SCHEME)://importer-service:8086
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: ems
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8083
      targetPort: 8083
