apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: user-postgres
  namespace: ems
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: user-postgres
  template:
    metadata:
      labels:
        app: user-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: user_service
            - name: POSTGRES_USER
              value: user_service
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ems-secrets
                  key: USER_SERVICE_DB_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: ems
spec:
  selector:
    app: user-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
