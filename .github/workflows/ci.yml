name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  JAVA_VERSION: "21"
  DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY || 'ghcr.io' }}
  DOCKER_IMAGE_NAMESPACE: ${{ secrets.DOCKER_IMAGE_NAMESPACE || github.repository_owner }}

jobs:
  build-test:
    name: Build and Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - ticket-service
          - event-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle
          cache-dependency-path: |
            ${{ matrix.service }}/gradle/wrapper/gradle-wrapper.properties
            ${{ matrix.service }}/build.gradle.kts
            ${{ matrix.service }}/settings.gradle.kts

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build and test ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: ./gradlew clean test bootJar --no-daemon --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-test-reports
          path: |
            ${{ matrix.service }}/build/reports/tests/test
            ${{ matrix.service }}/build/test-results/test
          if-no-files-found: ignore

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: ${{ matrix.service }}/build/libs/*.jar
          if-no-files-found: error

  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    needs: build-test
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Compile all services
        run: |
          ./user-service/gradlew -p user-service compileTestKotlin --no-daemon
          ./ticket-service/gradlew -p ticket-service compileTestKotlin --no-daemon
          ./event-service/gradlew -p event-service compileTestKotlin --no-daemon

      - name: Sonar analysis placeholder
        if: ${{ env.SONAR_TOKEN != '' }}
        run: |
          echo "Sonar secrets are present."
          echo "Add Sonar Gradle plugin or sonar-scanner here when project keys are finalized."

      - name: Dockerfile lint user-service
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: user-service/Dockerfile
          failure-threshold: warning

      - name: Dockerfile lint ticket-service
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ticket-service/Dockerfile
          failure-threshold: warning

      - name: Dockerfile lint event-service
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: event-service/Dockerfile
          failure-threshold: warning

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build all services for CodeQL
        run: |
          ./user-service/gradlew -p user-service compileKotlin --no-daemon
          ./ticket-service/gradlew -p ticket-service compileKotlin --no-daemon
          ./event-service/gradlew -p event-service compileKotlin --no-daemon

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs:
      - build-test
      - analyze
      - codeql
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        service:
          - user-service
          - ticket-service
          - event-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_IMAGE_NAMESPACE }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
